<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AdoptMe 가치 사이트</title>
    <style>
        body { text-align: center; font-family: sans-serif; }
        #header { height: 150px; background: #eee; margin-bottom: 20px; }
        #nav { margin-bottom: 10px; }
        #nav button { padding: 10px 20px; margin: 0 5px; cursor: pointer; }
        #ad-space { height: 200px; background: #ddd; margin: 20px 0; }
        #content-area { border: 2px solid #ccc; padding: 20px; min-height: 400px; }
    </style>
</head>
<body>

    <div id="header">
        <h1>[로고 이미지 공간]</h1>
    </div>

    <div id="nav">
        <button onclick="showContent('calculator')">손해/이득 판단</button>
        <button onclick="showContent('valueTable')">펫 가치표</button>
        <button onclick="window.open('유튜브주소')">유튜브 링크</button>
        <button onclick="showContent('search')">아이템 검색</button>
    </div>

    <div id="ad-space">광고가 들어갈 빈 큰 공간</div>

    <div id="content-area">
        <div id="main-content">
            <h2>여기에 기본적으로 손해/이득 계산기가 나타납니다.</h2>
        </div>
    </div>

    <script>
        function showContent(type) {
            const area = document.getElementById('main-content');
            if (type === 'valueTable') {
                area.innerHTML = '<h2>여기에 우리가 만든 펫 가치표를 불러옵니다.</h2>';
                // 나중에 여기서 아까 만든 표 데이터를 불러오는 함수를 실행합니다.
            } else if (type === 'calculator') {
                area.innerHTML = '<h2>여기에 손해/이득 계산기가 나타납니다.</h2>';
            }
        }
    </script>
</body>
</html>

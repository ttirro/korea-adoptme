<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 펫 가치표</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        img { width: 50px; }
    </style>
</head>
<body>
    <h1>펫 가치 리스트</h1>
    <table>
        <thead>
            <tr><th>이미지</th><th>이름</th><th>가치(RP)</th></tr>
        </thead>
        <tbody id="petBody"></tbody>
    </table>

    <script>
        // CSV 주소를 여기에 넣으세요
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRf_OTZXlK2wachpdnlg5k2BIHUaq7dE4ylJCUBpTjcIBwUX9m9gpJVH4XuXBtRLjBOeBxJXOLyGYlf/pub?output=csv';

		fetch(csvUrl)
			.then(res => res.text())
			.then(data => {
				const tbody = document.getElementById('petBody');
				const rows = data.split('\n');
				
				rows.forEach(row => {
					if (!row.trim()) return; // 빈 줄은 무시
					
					const cols = row.split(','); // 쉼표로 나눔
					if (cols.length < 3) return;

					// 시트 순서에 맞게 변수 할당: 0=가치, 1=이름, 2=ID
					const val = cols[0].trim();
					const name = cols[1].trim();
					const id = cols[2].trim();

					// 표에 데이터 추가
					tbody.innerHTML += `
						<tr>
							<td><img src="images/${id}.png" width="50" onerror="this.style.display='none'"></td>
							<td>${name}</td>
							<td>${val}</td>
						</tr>
					`;
				});
			})
			.catch(err => console.error("데이터 로딩 오류:", err));
	</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AdoptMe 가치 사이트</title>
    <style>
        body { text-align: center; font-family: sans-serif; }
        #header { height: 150px; background: #eee; margin-bottom: 20px; }
        #nav { margin-bottom: 10px; }
        #nav button { padding: 10px 20px; margin: 0 5px; cursor: pointer; }
        #ad-space { height: 200px; background: #ddd; margin: 20px 0; }
        #content-area { border: 2px solid #ccc; padding: 20px; min-height: 400px; }
    </style>
</head>
<body>

    <div id="header"><h1>[로고 이미지 공간]</h1></div>

    <div id="nav">
        <button onclick="loadPage('calculator.html')">손해/이득 판단</button>
        <button onclick="loadPage('value-table.html')">가치표</button>
        <button onclick="window.open('https://youtube.com')">유튜브 링크</button>
        <button onclick="loadPage('search.html')">아이템 검색</button>
    </div>

    <div id="ad-space">광고가 들어갈 빈 큰 공간</div>

    <div id="content-area">
        <div id="main-content">
            <h2>환영합니다! 메뉴를 선택하세요.</h2>
        </div>
    </div>

    <script>
        // 페이지 로드 함수
        function loadPage(page) {
            fetch(`content/${page}`)
                .then(response => {
                    if (!response.ok) throw new Error("파일을 찾을 수 없습니다.");
                    return response.text();
                })
                .then(html => {
                    document.getElementById('main-content').innerHTML = html;
                    // 가치표 페이지일 때만 실행
                    if(page === 'value-table.html') initValueTable();
                })
                .catch(err => console.error("로드 오류:", err));
        }

        // 가치표 데이터 로드 함수
        function initValueTable() {
            fetch('data.json')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('petBody');
                    if (!tbody) return; // 테이블이 없으면 종료
                    tbody.innerHTML = '';
                    data.forEach(pet => {
                        tbody.innerHTML += `
                            <tr>
                                <td><img src="images/${pet.id}.png" width="50" onerror="this.style.display='none'"></td>
                                <td>${pet.name}</td>
                                <td>${pet.value}</td>
                            </tr>
                        `;
                    });
                })
                .catch(err => console.error("데이터 로딩 실패:", err));
        }
    </script>
</body>
</html>

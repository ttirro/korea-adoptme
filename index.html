<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AdoptMe 가치 사이트</title>
    <style>
        body { text-align: center; font-family: sans-serif; }
        #header { height: 150px; background: #eee; margin-bottom: 20px; }
        #nav { margin-bottom: 10px; }
        #nav button { padding: 10px 20px; margin: 0 5px; cursor: pointer; }
        #ad-space { height: 200px; background: #ddd; margin: 20px 0; }
        #content-area { border: 2px solid #ccc; padding: 20px; min-height: 400px; }
    </style>
</head>
<body>

    <div id="header"><h1>[로고 이미지 공간]</h1></div>

    <div id="nav">
        <button onclick="loadPage('calculator.html')">손해/이득 판단</button>
        <button onclick="loadPage('value-table.html')">가치표</button>
        <button onclick="window.open('https://youtube.com')">유튜브 링크</button>
        <button onclick="loadPage('search.html')">아이템 검색</button>
    </div>

    <div id="ad-space">광고가 들어갈 빈 큰 공간</div>

    <div id="content-area">
        <div id="main-content">
            <h2>환영합니다! 메뉴를 선택하세요.</h2>
        </div>
    </div>

    <script>
        async function loadPage(page) {
			const container = document.getElementById('main-content');
			
			// 1. 파일을 불러오고
			const response = await fetch(`content/${page}`);
			const html = await response.text();
			container.innerHTML = html;

			// 2. 가치표라면 데이터를 불러올 때까지 '기다린' 후 그리기
			if(page === 'value-table.html') {
				await initValueTable(); // await를 붙여서 데이터가 다 올 때까지 기다림
			}
		}

		async function initValueTable() {
			const res = await fetch('data.json');
			const data = await res.json();
			
			const tbody = document.getElementById('petBody');
			if (!tbody) return;
			
			tbody.innerHTML = ''; // 기존 내용 완전히 비우기

			// (여기서 그룹화 로직 수행)
			const grouped = data.reduce((acc, pet) => {
				if (!acc[pet.value]) acc[pet.value] = [];
				acc[pet.value].push(pet);
				return acc;
			}, {});

			for (const value in grouped) {
				const pets = grouped[value];
				const imagesHtml = pets.map(p => 
					`<img src="images/${p.id}.png" width="50" style="margin:5px;">`
				).join('');

				tbody.innerHTML += `
					<tr style="border-bottom: 1px solid #ddd;">
						<td style="padding:10px; font-weight:bold;">${value}</td>
						<td style="padding:10px; text-align:left;">${imagesHtml}</td>
					</tr>
				`;
			}
		}
    </script>
</body>
</html>
